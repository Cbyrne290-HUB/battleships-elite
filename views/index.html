<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleships Elite</title>
    <style>
        body {
            background: #0b1121;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ff00;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }
        #terminal {
            width: 100%;
            max-width: 800px;
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            margin-bottom: 10px;
        }
        #input-row {
            display: flex;
            width: 100%;
            max-width: 800px;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            background: #000;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 4px;
            outline: none;
        }
        #send-btn {
            padding: 10px 20px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        #send-btn:hover { background: #00cc00; }
    </style>
</head>
<body>
    <h1>⚓ BATTLESHIPS ELITE</h1>
    <div id="terminal"></div>
    <div id="input-row">
        <input id="user-input" type="text" placeholder="Type your input and press Enter..." autofocus />
        <button id="send-btn">SEND</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const socket = io();

        socket.on('output', (data) => {
            terminal.innerText += data;
            terminal.scrollTop = terminal.scrollHeight;
        });

        function send() {
            const val = input.value;
            if (val.trim() === '') return;
            socket.emit('input', val);
            input.value = '';
        }

        btn.addEventListener('click', send);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
